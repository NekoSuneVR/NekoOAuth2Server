name: CI - Python SDK

on:
  push:
    branches: [main, sdk-publish]
    paths:
      - "packages/sdk-python/**"
      - ".github/workflows/ci-sdk-python.yml"
  pull_request:
    paths:
      - "packages/sdk-python/**"
      - ".github/workflows/ci-sdk-python.yml"

jobs:
  build-and-test:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: packages/sdk-python
    strategy:
      matrix:
        python-version: ["3.9", "3.11", "3.12"]
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install package + dev dependencies
        run: pip install -e ".[dev]"

      - name: Run tests
        run: pytest -v

      - name: Build the distributable (sdist + wheel)
        run: |
          pip install build
          python -m build
