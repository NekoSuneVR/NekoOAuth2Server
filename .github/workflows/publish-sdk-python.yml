name: Publish Python SDK to PyPI

# Dedicated tag prefix, same reasoning as publish-sdk.yml (npm) -- keeps this
# from ever being confused with a server release tag or the other SDKs'.
on:
  push:
    tags:
      - "sdk-python-v*.*.*"

jobs:
  publish:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: packages/sdk-python
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install package + dev dependencies
        run: pip install -e ".[dev]"

      - name: Run tests
        run: pytest -v

      - name: Verify tag matches pyproject.toml version
        run: |
          TAG_VERSION="${GITHUB_REF_NAME#sdk-python-v}"
          PKG_VERSION="$(python -c "import tomllib; print(tomllib.load(open('pyproject.toml','rb'))['project']['version'])")"
          if [ "$TAG_VERSION" != "$PKG_VERSION" ]; then
            echo "Tag sdk-python-v$TAG_VERSION does not match pyproject.toml version $PKG_VERSION"
            exit 1
          fi

      - name: Build sdist + wheel
        run: |
          pip install build
          python -m build

      - name: Publish to PyPI
        uses: pypa/gh-action-pypi-publish@release/v1
        with:
          packages-dir: packages/sdk-python/dist
          # Needs a PYPI_API_TOKEN secret added to the repo before this can
          # actually publish -- an account-owner step, same as the npm
          # workflow's NPM_TOKEN.
          password: ${{ secrets.PYPI_API_TOKEN }}
